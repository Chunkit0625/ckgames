<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://sf16-muse-va.ibytedtos.com/obj/static-us-west/ttmg-jssdk/v1.0.0/ttmg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } </style>
</head>
<body>
<script>
    // 初始化 SDK
    if (typeof ttmg !== 'undefined') {
        ttmg.init({
            success: (res) => { console.log('TikTok SDK initialized', res); },
            fail: (err) => { console.error('TikTok SDK failed', err); }
        });
    }

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    let player, enemies, scoreText;
    let score = 0;
    let gameActive = true;
    const game = new Phaser.Game(config);

    function preload() {}

    function create() {
        player = this.add.graphics();
        player.lineStyle(3, 0x00ffff, 1);
        player.strokeTriangle(0, 20, -15, -10, 15, -10);
        const container = this.add.container(window.innerWidth / 2, window.innerHeight - 100);
        container.add(player);
        this.physics.add.existing(container);
        player = container;
        player.body.setCollideWorldBounds(true);
        enemies = this.physics.add.group();
        scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '24px', fill: '#0ff' });

        this.time.addEvent({
            delay: 1000,
            callback: () => {
                if (!gameActive) return;
                const x = Phaser.Math.Between(50, window.innerWidth - 50);
                const enemy = this.add.graphics();
                enemy.lineStyle(2, 0xff00ff, 1);
                enemy.strokeTriangle(0, -15, -10, 10, 10, 10);
                const eContainer = this.add.container(x, -50);
                eContainer.add(enemy);
                this.physics.add.existing(eContainer);
                enemies.add(eContainer);
                eContainer.body.setVelocityY(200 + score * 5);
            },
            callbackScope: this,
            loop: true
        });

        this.physics.add.overlap(player, enemies, () => {
            gameActive = false;
            this.physics.pause();
            this.add.text(window.innerWidth / 2 - 80, window.innerHeight / 2, 'GAME OVER', { fontSize: '32px', fill: '#f00' });
        }, null, this);

        this.input.on('pointermove', (p) => { if (gameActive) player.x = p.x; });
    }

    function update() {
        if (!gameActive) return;
        enemies.children.iterate(child => {
            if (child && child.y > window.innerHeight + 50) {
                child.destroy();
                score += 10;
                scoreText.setText('Score: ' + score);
            }
        });
    }
</script>
</body>
</html>
